<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전도짝만들기</title>
  
  <!-- 가장 안정적인 Tailwind CSS 플레이 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 및 안정화된 Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes popIn {
      0% { transform: scale(0.85); opacity: 0; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-popIn {
      animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes shakeBox {
      0%, 100% { transform: rotate(0deg) scale(1); }
      20% { transform: rotate(-8deg) scale(1.05); }
      40% { transform: rotate(8deg) scale(1.05); }
      60% { transform: rotate(-5deg) scale(1.05); }
      80% { transform: rotate(5deg) scale(1.05); }
    }
    .animate-shakeBox {
      animation: shakeBox 0.6s ease-in-out infinite;
    }

    @keyframes flyDrawn {
      0% { transform: scale(0.5) translateY(50px); opacity: 0; filter: blur(4px); }
      100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
    }
    .animate-flyDrawn {
      animation: flyDrawn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes pulseSoft {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.03); }
    }
    .animate-pulseSoft {
      animation: pulseSoft 2s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

  <div id="root"></div>

  <!-- React Application 코드 스크립트 -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // 에러 유발 함수 제거 -> 직관적이고 안전한 아이콘 컴포넌트로 재설계
    function Icon({ name, className = "w-5 h-5" }) {
      const baseClass = `${className} inline-block`;
      
      switch(name) {
        case 'help-circle':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          );
        case 'users':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          );
        case 'info':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
          );
        case 'user-plus':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
          );
        case 'trash-2':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
            </svg>
          );
        case 'layers':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polygon points="12 2 2 7 12 12 22 7 12 2"/><polygon points="2 17 12 22 22 17"/><polygon points="2 12 12 17 22 12"/>
            </svg>
          );
        case 'check':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          );
        case 'shuffle':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/>
            </svg>
          );
        case 'arrow-right':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          );
        case 'copy':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          );
        case 'history':
          return (
            <svg className={baseClass} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/><line x1="12" y1="7" x2="12" y2="12"/><line x1="12" y1="12" x2="16" y2="14"/>
            </svg>
          );
        default:
          return null;
      }
    }

    function App() {
      const [inputText, setInputText] = useState('');
      const [priority, setPriority] = useState('prefer2');
      const [selectedComboId, setSelectedComboId] = useState('');
      
      const [isShuffling, setIsShuffling] = useState(false);
      const [shuffleStage, setShuffleStage] = useState('idle'); 
      const [countdownNum, setCountdownNum] = useState(3);
      const [currentDrawingName, setCurrentDrawingName] = useState('');
      const [currentDrawingGroup, setCurrentDrawingGroup] = useState(0);
      
      const [revealedGroups, setRevealedGroups] = useState([]); 
      const [finalTargetGroups, setFinalTargetGroups] = useState([]);

      const [groups, setGroups] = useState([]);
      const [history, setHistory] = useState([]);
      const [copied, setCopied] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');
      const [showGuide, setShowGuide] = useState(true);

      const drawTimerRef = useRef(null);
      const sampleNames = "김은혜 박지성 이사랑 최믿음 정소망 강평화 윤온유 조희망 한신실 신은총";

      const names = useMemo(() => {
        return inputText
          .split(/[\s\n,]+/)
          .map(name => name.trim())
          .filter(name => name.length > 0);
      }, [inputText]);

      const combinations = useMemo(() => {
        const N = names.length;
        if (N < 2) return [];

        const validCombos = [];
        const maxY = Math.floor(N / 3);

        for (let y = 0; y <= maxY; y++) {
          const remaining = N - (3 * y);
          if (remaining % 2 === 0) {
            const x = remaining / 2;
            validCombos.push({
              id: `2x_${x}_3y_${y}`,
              groupsOf2: x,
              groupsOf3: y,
              totalGroups: x + y
            });
          }
        }

        return [...validCombos].sort((a, b) => {
          if (priority === 'prefer2') {
            return b.groupsOf2 - a.groupsOf2;
          } else {
            return b.groupsOf3 - a.groupsOf3;
          }
        });
      }, [names, priority]);

      const activeCombo = useMemo(() => {
        if (combinations.length === 0) return null;
        const found = combinations.find(c => c.id === selectedComboId);
        return found || combinations[0];
      }, [combinations, selectedComboId]);

      const activeComboId = activeCombo ? activeCombo.id : '';

      const handleLoadSamples = () => setInputText(sampleNames);
      const handleClear = () => {
        setInputText('');
        setGroups([]);
        setErrorMessage('');
      };

      const handleShuffleSequence = () => {
        if (names.length < 2) {
          setErrorMessage('짝을 만들기 위해 최소 2명 이상의 이름을 입력해주세요!');
          return;
        }
        if (!activeCombo) {
          setErrorMessage('해당 인원수로는 2명 또는 3명으로 구성할 수 없습니다. 인원을 확인해 주세요.');
          return;
        }

        setErrorMessage('');
        setIsShuffling(true);
        setShuffleStage('countdown');
        setCountdownNum(3);

        const shuffledNames = [...names].sort(() => Math.random() - 0.5);
        const tempTargetGroups = [];
        let pointer = 0;

        const { groupsOf3, groupsOf2 } = activeCombo;

        for (let i = 0; i < groupsOf3; i++) {
          tempTargetGroups.push(shuffledNames.slice(pointer, pointer + 3));
          pointer += 3;
        }
        for (let i = 0; i < groupsOf2; i++) {
          tempTargetGroups.push(shuffledNames.slice(pointer, pointer + 2));
          pointer += 2;
        }

        const finalCalculated = tempTargetGroups.sort(() => Math.random() - 0.5);
        setFinalTargetGroups(finalCalculated);

        const emptyLayout = finalCalculated.map(group => Array(group.length).fill(null));
        setRevealedGroups(emptyLayout);

        let currentCount = 3;
        const countdownInterval = setInterval(() => {
          currentCount--;
          if (currentCount > 0) {
            setCountdownNum(currentCount);
          } else {
            clearInterval(countdownInterval);
            startLiveDrawing(finalCalculated, emptyLayout);
          }
        }, 700);
      };

      const startLiveDrawing = (targetGroups, initialLayout) => {
        setShuffleStage('drawing');

        const drawSteps = [];
        const maxMembers = Math.max(...targetGroups.map(g => g.length));

        for (let memberIdx = 0; memberIdx < maxMembers; memberIdx++) {
          for (let groupIdx = 0; groupIdx < targetGroups.length; groupIdx++) {
            if (targetGroups[groupIdx][memberIdx]) {
              drawSteps.push({
                name: targetGroups[groupIdx][memberIdx],
                groupIdx: groupIdx,
                memberIdx: memberIdx
              });
            }
          }
        }

        let stepIndex = 0;
        const currentRevealed = initialLayout.map(arr => [...arr]);

        const drawNext = () => {
          if (stepIndex < drawSteps.length) {
            const step = drawSteps[stepIndex];
            setCurrentDrawingName(step.name);
            setCurrentDrawingGroup(step.groupIdx);

            setTimeout(() => {
              currentRevealed[step.groupIdx][step.memberIdx] = step.name;
              setRevealedGroups(currentRevealed.map(arr => [...arr]));
            }, 250);

            stepIndex++;
            drawTimerRef.current = setTimeout(drawNext, 1200);
          } else {
            finishDrawing(targetGroups);
          }
        };

        drawNext();
      };

      const handleSkipAnimation = () => {
        if (drawTimerRef.current) {
          clearTimeout(drawTimerRef.current);
        }
        finishDrawing(finalTargetGroups);
      };

      const finishDrawing = (targetGroups) => {
        setGroups(targetGroups);
        setIsShuffling(false);
        setShuffleStage('done');
        setCurrentDrawingName('');

        const comboDesc = activeCombo 
          ? `2인조 ${activeCombo.groupsOf2}개 / 3인조 ${activeCombo.groupsOf3}개`
          : '';
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        setHistory(prev => [
          {
            id: Date.now(),
            time: timestamp,
            total: names.length,
            groupsCount: targetGroups.length,
            comboDesc: comboDesc,
            data: targetGroups
          },
          ...prev.slice(0, 4)
        ]);
      };

      useEffect(() => {
        return () => {
          if (drawTimerRef.current) clearTimeout(drawTimerRef.current);
        };
      }, []);

      const handleCopyToClipboard = () => {
        if (groups.length === 0) return;

        let textToCopy = `✨ [전도짝 매칭 결과] ✨\n`;
        textToCopy += `📅 일시: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}\n`;
        textToCopy += `👥 총 인원: ${names.length}명 (${groups.length}개 조)\n`;
        textToCopy += `-----------------------------\n`;
        
        groups.forEach((group, index) => {
          textToCopy += `📍 ${index + 1}조 (${group.length}명): ${group.join(', ')}\n`;
        });
        textToCopy += `-----------------------------\n`;
        textToCopy += `서로를 이끌어주고 동역하는 기쁨이 가득하시길 소망합니다! 🙏`;

        const textArea = document.createElement("textarea");
        textArea.value = textToCopy;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error(err);
        }
        document.body.removeChild(textArea);
      };

      return (
        <div className="flex flex-col min-h-screen">
          {/* 상단 헤더 */}
          <header className="bg-gradient-to-r from-teal-600 via-emerald-600 to-indigo-600 text-white shadow-md">
            <div className="max-w-4xl mx-auto px-4 py-6 md:py-8 text-center relative">
              <div className="absolute right-4 top-4">
                <button onClick={() => setShowGuide(!showGuide)} className="p-2 bg-white/10 hover:bg-white/20 transition-all rounded-full cursor-pointer">
                  <Icon name="help-circle" />
                </button>
              </div>
              <div className="flex items-center justify-center gap-2 mb-2">
                <span className="p-2 bg-white/20 rounded-xl backdrop-blur-sm">
                  <Icon name="users" className="w-7 h-7 text-yellow-300 animate-pulse" />
                </span>
                <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight">전도짝만들기</h1>
              </div>
              <p className="text-emerald-100 text-sm md:text-base mt-1 font-medium">
                최소 2명, 최대 3명으로 구성되는 믿음의 최적 동역자 매칭 플랫폼 👥
              </p>
            </div>
          </header>

          {/* 메인 영역 */}
          <main className="flex-grow max-w-4xl w-full mx-auto px-4 py-6 flex flex-col gap-4 md:gap-6">
            
            {/* 가이드 창 */}
            {showGuide && !isShuffling && (
              <div className="bg-gradient-to-r from-teal-50 to-emerald-50 border border-teal-100 rounded-2xl p-5 shadow-sm animate-fadeIn">
                <div className="flex items-start gap-3">
                  <Icon name="info" className="w-5 h-5 text-teal-600 mt-0.5 shrink-0" />
                  <div>
                    <h3 className="font-bold text-teal-800 text-base mb-1">💡 동역자 추첨 안내</h3>
                    <ul className="text-teal-700 text-sm space-y-1 list-disc pl-4 leading-relaxed">
                      <li>모든 인원은 <strong>최소 2명에서 최대 3명</strong>으로만 남김없이 매칭됩니다.</li>
                      <li>이름은 입력창에 <strong>공백(띄어쓰기)</strong>이나 <strong>줄바꿈</strong>으로 구분해서 편하게 작성해 주세요.</li>
                      <li>임의로 조 짜기 버튼을 클릭하면 한 명씩 이름이 날아가 조를 구성하는 <strong>추첨 쇼 애니메이션</strong>이 시작됩니다!</li>
                    </ul>
                  </div>
                </div>
              </div>
            )}

            {/* 메인 제어부 */}
            {!isShuffling && (
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 md:p-6 animate-fadeIn">
                <div className="flex flex-col gap-4">
                  <div className="flex items-center justify-between">
                    <label className="text-base font-bold text-slate-700 flex items-center gap-2">
                      <Icon name="user-plus" className="text-teal-600" />
                      전도 대원 명단 입력
                    </label>
                    <div className="flex gap-2">
                      <button onClick={handleLoadSamples} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-semibold border border-slate-200 cursor-pointer">
                        ✨ 샘플 이름 입력
                      </button>
                      <button onClick={handleClear} className="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1 cursor-pointer">
                        <Icon name="trash-2" className="w-3.5 h-3.5" />
                        지우기
                      </button>
                    </div>
                  </div>

                  <div className="relative">
                    <textarea
                      value={inputText}
                      onChange={(e) => setInputText(e.target.value)}
                      placeholder="대원들의 이름을 공백(띄어쓰기) 또는 엔터로 구분하여 넣어주세요. 예: 김사랑 박동역 이은혜 최믿음"
                      className="w-full h-32 md:h-36 p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-slate-800 placeholder-slate-400 outline-none transition-all resize-none font-medium leading-relaxed"
                    />
                    {names.length > 0 && (
                      <div className="absolute bottom-3 right-3 bg-teal-50 text-teal-700 text-xs font-bold px-2.5 py-1 rounded-md border border-teal-200">
                        현재 입력: {names.length}명
                      </div>
                    )}
                  </div>

                  {/* 조합 선택 영역 */}
                  {names.length >= 2 && (
                    <div className="bg-slate-50 rounded-xl p-4 border border-slate-200/60 animate-fadeIn">
                      <div className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-1.5">
                        <Icon name="layers" className="text-teal-600 w-4.5 h-4.5" />
                        가능한 조 조합 선택 ({names.length}명 기준)
                      </div>

                      {combinations.length > 0 ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5">
                          {combinations.map((combo) => {
                            const isSelected = activeComboId === combo.id;
                            return (
                              <button
                                key={combo.id}
                                type="button"
                                onClick={() => setSelectedComboId(combo.id)}
                                className={`flex items-center justify-between p-3.5 rounded-xl border text-left transition-all cursor-pointer ${
                                  isSelected 
                                    ? 'border-teal-500 bg-teal-50/70 ring-2 ring-teal-500/20 text-teal-900 font-semibold shadow-sm' 
                                    : 'border-slate-200 bg-white hover:border-slate-300 text-slate-700'
                                }`}
                              >
                                <div className="flex flex-col gap-0.5">
                                  <span className="font-bold text-sm">2인조 {combo.groupsOf2}개 + 3인조 {combo.groupsOf3}개</span>
                                  <span className="text-xs text-slate-500 font-medium">총 {combo.totalGroups}개 조 편성</span>
                                </div>
                                <div className={`w-5 h-5 rounded-full border flex items-center justify-center transition-all ${isSelected ? 'border-teal-600 bg-teal-600 text-white' : 'border-slate-300 bg-slate-50'}`}>
                                  {isSelected && <Icon name="check" className="w-3.5 h-3.5" />}
                                </div>
                              </button>
                            );
                          })}
                        </div>
                      ) : (
                        <div className="text-xs text-rose-600 font-semibold p-2 bg-rose-50 rounded-lg">
                          ⚠️ 완벽히 나눌 수 없는 인원수입니다. 인원을 추가하거나 조정해 주세요.
                        </div>
                      )}

                      <div className="flex items-center gap-4 mt-4 pt-3 border-t border-slate-200/60 text-xs text-slate-500">
                        <span className="font-bold text-slate-600">정렬 필터:</span>
                        <div className="flex gap-2">
                          <button type="button" onClick={() => setPriority('prefer2')} className={`px-3 py-1.5 rounded-md font-semibold cursor-pointer transition-colors ${priority === 'prefer2' ? 'bg-teal-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}>2인조 중심</button>
                          <button type="button" onClick={() => setPriority('prefer3')} className={`px-3 py-1.5 rounded-md font-semibold cursor-pointer transition-colors ${priority === 'prefer3' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}>3인조 중심</button>
                        </div>
                      </div>
                    </div>
                  )}

                  {errorMessage && <div className="bg-red-50 text-red-700 text-sm p-3.5 rounded-xl border border-red-100 font-medium">⚠️ {errorMessage}</div>}

                  <button
                    onClick={handleShuffleSequence}
                    disabled={names.length < 2 || !activeCombo}
                    className={`w-full py-4 rounded-xl font-bold text-lg shadow-sm transition-all transform flex items-center justify-center gap-2 cursor-pointer ${
                      names.length < 2 || !activeCombo ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-teal-500 via-emerald-600 to-indigo-600 hover:opacity-95 text-white hover:shadow-md hover:-translate-y-0.5 active:translate-y-0'
                    }`}
                  >
                    <Icon name="shuffle" className="w-5 h-5" />
                    추첨 시작! 🎲
                  </button>
                </div>
              </div>
            )}

            {/* ==================== [ 실시간 추첨 무대 극장 ] ==================== */}
            {isShuffling && (
              <div className="bg-slate-900 text-slate-100 rounded-3xl border border-slate-800 shadow-2xl p-6 md:p-8 flex flex-col gap-6 animate-fadeIn">
                
                <div className="flex items-center justify-between border-b border-slate-800 pb-4">
                  <div className="flex items-center gap-2">
                    <span className="w-3.5 h-3.5 rounded-full bg-red-500 animate-ping"></span>
                    <span className="text-sm font-semibold text-teal-400 tracking-wider">LIVE DRAW STAGE</span>
                  </div>
                  <button 
                    onClick={handleSkipAnimation}
                    className="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-3.5 py-2 rounded-xl transition-all cursor-pointer flex items-center gap-1.5 font-medium"
                  >
                    <Icon name="arrow-right" className="w-3.5 h-3.5" />
                    바로 결과 보기 (Skip)
                  </button>
                </div>

                {shuffleStage === 'countdown' && (
                  <div className="py-12 flex flex-col items-center justify-center text-center gap-4">
                    <div className="text-sm text-slate-400 font-semibold uppercase tracking-widest">준비 해주세요</div>
                    <div className="text-7xl font-extrabold text-teal-400 tracking-tight scale-110 transition-transform duration-300 animate-bounce">
                      {countdownNum}
                    </div>
                    <p className="text-xs text-slate-500">은혜로운 매칭을 시작합니다!</p>
                  </div>
                )}

                {shuffleStage === 'drawing' && (
                  <div className="flex flex-col gap-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-950 p-6 rounded-2xl border border-slate-800 relative overflow-hidden">
                      
                      <div className="flex flex-col items-center justify-center p-4 border-r border-slate-800/60 relative">
                        <div className="absolute text-2xl top-4 left-6 opacity-20 animate-bounce">🎈</div>
                        <div className="absolute text-xl bottom-6 right-8 opacity-20 animate-pulse">✨</div>
                        <div className="text-5xl mb-4 animate-shakeBox inline-block">🗳️</div>
                        <h4 className="text-sm font-bold text-slate-400 tracking-tight mb-1">축 전도짝 추첨함</h4>
                        <p className="text-xs text-slate-500">상자 안에서 파트너를 찾는 중...</p>
                      </div>

                      <div className="flex flex-col items-center justify-center p-4 min-h-[160px] relative">
                        {currentDrawingName ? (
                          <div className="text-center animate-flyDrawn flex flex-col items-center gap-2">
                            <span className="text-xs bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 font-bold px-3 py-1 rounded-full animate-pulse">
                              🎯 대원 뽑힘!
                            </span>
                            <div className="text-3xl md:text-4xl font-extrabold text-white tracking-wide flex items-center gap-2">
                              {currentDrawingName}
                            </div>
                            <span className="text-xs text-slate-400 mt-1 font-medium">
                              👉 <strong className="text-teal-400">{currentDrawingGroup + 1}조</strong>로 비행 중...
                            </span>
                          </div>
                        ) : (
                          <div className="text-slate-500 text-sm font-semibold flex items-center gap-2 animate-pulse">
                            <Icon name="shuffle" />
                            공정한 조력 매칭 진행 중...
                          </div>
                        )}
                      </div>
                    </div>

                    <div>
                      <div className="text-xs font-bold text-slate-400 mb-3 tracking-widest flex items-center gap-1.5">
                        <Icon name="layers" className="w-4 h-4 text-teal-400" />
                        실시간 배정 현황판 (2~3인 구성)
                      </div>
                      
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        {revealedGroups.map((groupSlots, gIdx) => {
                          const isActiveTarget = currentDrawingName && currentDrawingGroup === gIdx;
                          return (
                            <div 
                              key={gIdx} 
                              className={`p-4 rounded-xl border transition-all duration-300 ${
                                isActiveTarget 
                                  ? 'bg-slate-800/80 border-teal-500 shadow-[0_0_15px_rgba(20,184,166,0.15)] scale-[1.01]' 
                                  : 'bg-slate-950/60 border-slate-800'
                              }`}
                            >
                              <div className="flex items-center justify-between mb-3 text-xs font-bold text-slate-400">
                                <span className="flex items-center gap-1.5">
                                  <span className={`w-1.5 h-3 rounded-full ${isActiveTarget ? 'bg-teal-400 animate-pulse' : 'bg-slate-600'}`}></span>
                                  {gIdx + 1}조
                                </span>
                                <span className="text-[10px] bg-slate-800 text-slate-300 px-2 py-0.5 rounded-full border border-slate-700 font-medium">
                                  {groupSlots.length}인조 슬롯
                                </span>
                              </div>

                              <div className="flex flex-col gap-2">
                                {groupSlots.map((member, mIdx) => {
                                  if (member) {
                                    return (
                                      <div 
                                        key={mIdx} 
                                        className="px-3.5 py-2.5 bg-slate-800 rounded-lg text-sm font-bold text-slate-100 flex items-center justify-between border border-slate-700/50 animate-popIn"
                                      >
                                        <span className="flex items-center gap-2">
                                          <span className="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                                          {member}
                                        </span>
                                        <span className="text-[10px] text-emerald-400 flex items-center gap-0.5 font-medium">
                                          <Icon name="check" className="w-3 h-3" /> 배정됨
                                        </span>
                                      </div>
                                    );
                                  } else {
                                    return (
                                      <div 
                                        key={mIdx} 
                                        className="px-3.5 py-2.5 rounded-lg text-sm font-bold text-slate-600 border border-dashed border-slate-800 flex items-center justify-between bg-slate-900/30 animate-pulseSoft"
                                      >
                                        <span className="flex items-center gap-2">
                                          <span className="w-1.5 h-1.5 rounded-full bg-slate-800"></span>
                                          대기 중...
                                        </span>
                                        <span className="text-xs font-medium">?</span>
                                      </div>
                                    );
                                  }
                                })}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ==================== [ 최종 매칭 결과 카드 ] ==================== */}
            {!isShuffling && groups.length > 0 && (
              <div className="bg-white rounded-2xl border border-slate-200 shadow-md p-5 md:p-6 animate-fadeIn">
                <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between pb-4 mb-5 border-b border-slate-100 gap-3">
                  <div>
                    <h2 className="text-xl font-extrabold text-slate-800 flex items-center gap-2">
                      <span className="w-2.5 h-6 bg-teal-500 rounded-full inline-block animate-pulse"></span>
                      매칭 완료 👏
                    </h2>
                    <p className="text-xs text-slate-500 mt-1">총 {names.length}명이 공정한 절차를 거쳐 조로 완벽히 배정되었습니다.</p>
                  </div>
                  <button onClick={handleCopyToClipboard} className="flex items-center gap-1.5 text-sm font-bold px-4 py-2.5 rounded-xl border transition-all bg-white text-slate-700 border-slate-200 hover:bg-slate-50 cursor-pointer">
                    <Icon name={copied ? "check" : "copy"} className={copied ? "text-emerald-600" : "text-slate-500"} />
                    {copied ? '복사 완료!' : '전체 결과 복사'}
                  </button>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {groups.map((group, index) => {
                    const colorSchemes = [
                      'from-teal-50 to-emerald-50/40 border-teal-100 text-teal-800',
                      'from-indigo-50 to-blue-50/40 border-indigo-100 text-indigo-800',
                      'from-amber-50 to-yellow-50/40 border-amber-100 text-amber-800',
                      'from-rose-50 to-pink-50/40 border-rose-100 text-rose-800'
                    ];
                    const scheme = colorSchemes[index % colorSchemes.length];
                    return (
                      <div key={index} className={`bg-gradient-to-br ${scheme} border rounded-2xl p-5 shadow-sm hover:scale-[1.01] transition-transform duration-200`}>
                        <div className="flex items-center justify-between mb-3.5">
                          <span className="text-base font-extrabold flex items-center gap-1.5">👥 {index + 1}조</span>
                          <span className="text-xs font-bold px-2.5 py-1 bg-white/80 rounded-full border border-black/5 text-slate-700">{group.length}명 짝</span>
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {group.map((member, mIdx) => (
                            <div key={mIdx} className="px-3.5 py-2 bg-white rounded-xl shadow-sm border border-black/5 font-bold text-slate-800 flex items-center gap-1.5 text-sm animate-popIn" style={{animationDelay: `${mIdx * 80}ms`}}>
                              <span className="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                              {member}
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* 세션 히스토리 */}
            {history.length > 0 && !isShuffling && (
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 md:p-6 animate-fadeIn">
                <h3 className="text-sm font-bold text-slate-600 mb-4 flex items-center gap-1.5">
                  <Icon name="history" className="text-indigo-500" />
                  최근 매칭 내역
                </h3>
                <div className="flex flex-col gap-2">
                  {history.map((item, index) => (
                    <div key={item.id} className="flex items-center justify-between p-3 rounded-xl bg-slate-50 border border-slate-100 text-sm">
                      <div className="flex items-center gap-3">
                        <span className="text-xs font-bold text-slate-400 bg-slate-200 px-2 py-0.5 rounded-md">#{history.length - index}</span>
                        <span className="font-semibold text-slate-700">총 {item.total}명 ({item.comboDesc})</span>
                      </div>
                      <button onClick={() => setGroups(item.data)} className="text-xs bg-white text-indigo-600 hover:bg-indigo-50 border border-indigo-200 px-3 py-1.5 rounded-lg font-bold cursor-pointer transition-all">다시보기</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          <footer className="bg-slate-100 border-t border-slate-200 mt-12 py-6 text-center text-xs text-slate-500">
            <p className="font-semibold text-slate-600">전도짝만들기 - 믿음의 소중한 동역 매칭 👥</p>
            <p className="mt-1">© 2026 전도짝메이커. 모든 대원들의 소중하고 값진 믿음의 교제를 늘 응원합니다.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
