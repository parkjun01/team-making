```html
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전도짝만들기</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 간단한 Lucide 아이콘 컴포넌트 래퍼 (CDN 아이콘 로드용)
    function Icon({ name, className = "w-5 h-5" }) {
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [name]);
      return <i data-lucide={name} class={`${className} inline-block`}></i>;
    }

    function App() {
      const [inputText, setInputText] = useState('');
      const [names, setNames] = useState([]);
      const [priority, setPriority] = useState('prefer2');
      const [combinations, setCombinations] = useState([]);
      const [selectedCombo, setSelectedCombo] = useState(null);
      const [isShuffling, setIsShuffling] = useState(false);
      const [groups, setGroups] = useState([]);
      const [history, setHistory] = useState([]);
      const [copied, setCopied] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');
      const [showGuide, setShowGuide] = useState(true);
      const [shuffleText, setShuffleText] = useState('');

      const sampleNames = "김은혜 박지성 이사랑 최믿음 정소망 강평화 윤온유 조희망 한신실 신은총";

      // 실시간 이름 파싱 (공백, 줄바꿈 기준)
      useEffect(() => {
        const parsed = inputText
          .split(/[\s\n,]+/)
          .map(name => name.trim())
          .filter(name => name.length > 0);
        setNames(parsed);
        
        if (parsed.length >= 2) {
          setErrorMessage('');
        }
      }, [inputText]);

      // 수학적 조합 계산 (2x + 3y = N)
      useEffect(() => {
        const N = names.length;
        if (N < 2) {
          setCombinations([]);
          setSelectedCombo(null);
          return;
        }

        const validCombos = [];
        const maxY = Math.floor(N / 3);

        for (let y = 0; y <= maxY; y++) {
          const remaining = N - (3 * y);
          if (remaining % 2 === 0) {
            const x = remaining / 2;
            validCombos.push({
              id: `2x_${x}_3y_${y}`,
              groupsOf2: x,
              groupsOf3: y,
              totalGroups: x + y
            });
          }
        }

        const sortedCombos = [...validCombos].sort((a, b) => {
          if (priority === 'prefer2') {
            return b.groupsOf2 - a.groupsOf2;
          } else {
            return b.groupsOf3 - a.groupsOf3;
          }
        });

        setCombinations(sortedCombos);

        if (sortedCombos.length > 0) {
          setSelectedCombo(sortedCombos[0]);
        } else {
          setSelectedCombo(null);
        }
      }, [names, priority]);

      const handleLoadSamples = () => setInputText(sampleNames);
      const handleClear = () => {
        setInputText('');
        setGroups([]);
        setErrorMessage('');
      };

      // 무작위 조 짜기 알고리즘 실행
      const handleShuffle = () => {
        if (names.length < 2) {
          setErrorMessage('짝을 만들기 위해 최소 2명 이상의 이름을 입력해주세요!');
          return;
        }
        if (!selectedCombo) {
          setErrorMessage('해당 인원수로는 2명 또는 3명으로 구성할 수 없습니다.');
          return;
        }

        setIsShuffling(true);
        setErrorMessage('');
        
        const loadingPhrases = [
          "기도하며 동역자를 매칭하는 중...",
          "하늘의 섭리로 최고의 조를 구성하는 중...",
          "서로에게 힘이 될 짝을 찾는 중...",
          "은혜로운 만남을 조율하고 있습니다..."
        ];
        
        let phraseIdx = 0;
        setShuffleText(loadingPhrases[0]);
        
        const textInterval = setInterval(() => {
          phraseIdx = (phraseIdx + 1) % loadingPhrases.length;
          setShuffleText(loadingPhrases[phraseIdx]);
        }, 450);

        setTimeout(() => {
          clearInterval(textInterval);
          
          const shuffledNames = [...names].sort(() => Math.random() - 0.5);
          const generatedGroups = [];
          let pointer = 0;

          const { groupsOf3, groupsOf2 } = selectedCombo;

          for (let i = 0; i < groupsOf3; i++) {
            generatedGroups.push(shuffledNames.slice(pointer, pointer + 3));
            pointer += 3;
          }
          for (let i = 0; i < groupsOf2; i++) {
            generatedGroups.push(shuffledNames.slice(pointer, pointer + 2));
            pointer += 2;
          }

          const finalGroups = generatedGroups.sort(() => Math.random() - 0.5);
          setGroups(finalGroups);
          setIsShuffling(false);

          const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          setHistory(prev => [
            {
              id: Date.now(),
              time: timestamp,
              total: names.length,
              groupsCount: finalGroups.length,
              comboDesc: `2인조 ${groupsOf2}개 / 3인조 ${groupsOf3}개`,
              data: finalGroups
            },
            ...prev.slice(0, 4)
          ]);
        }, 1800);
      };

      // 결과 클립보드 복사
      const handleCopyToClipboard = () => {
        if (groups.length === 0) return;

        let textToCopy = `✨ [전도짝 매칭 결과] ✨\n`;
        textToCopy += `📅 일시: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}\n`;
        textToCopy += `👥 총 인원: ${names.length}명 (${groups.length}개 조)\n`;
        textToCopy += `-----------------------------\n`;
        
        groups.forEach((group, index) => {
          textToCopy += `📍 ${index + 1}조 (${group.length}명): ${group.join(', ')}\n`;
        });
        textToCopy += `-----------------------------\n`;
        textToCopy += `서로를 이끌어주고 동역하는 기쁨이 가득하시길 소망합니다! 🙏`;

        const textArea = document.createElement("textarea");
        textArea.value = textToCopy;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error(err);
        }
        document.body.removeChild(textArea);
      };

      return (
        <div class="flex flex-col min-h-screen">
          {/* 상단 헤더 */}
          <header class="bg-gradient-to-r from-teal-600 via-emerald-600 to-indigo-600 text-white shadow-md">
            <div class="max-w-4xl mx-auto px-4 py-6 md:py-8 text-center relative">
              <div class="absolute right-4 top-4">
                <button onClick={() => setShowGuide(!showGuide)} class="p-2 bg-white/10 hover:bg-white/20 transition-all rounded-full">
                  <Icon name="help-circle" />
                </button>
              </div>
              <div class="flex items-center justify-center gap-2 mb-2">
                <span class="p-2 bg-white/20 rounded-xl backdrop-blur-sm">
                  <Icon name="users" className="w-7 h-7 text-yellow-300" />
                </span>
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight">전도짝만들기</h1>
              </div>
              <p class="text-emerald-100 text-sm md:text-base mt-1 font-medium">
                최소 2명, 최대 3명으로 구성되는 믿음의 최적 동역자 매칭 플랫폼 👥
              </p>
            </div>
          </header>

          {/* 메인 영역 */}
          <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-6 flex flex-col gap-4 md:gap-6">
            {showGuide && (
              <div class="bg-gradient-to-r from-teal-50 to-emerald-50 border border-teal-100 rounded-2xl p-5 shadow-sm animate-fadeIn">
                <div class="flex items-start gap-3">
                  <Icon name="info" className="w-5 h-5 text-teal-600 mt-0.5 shrink-0" />
                  <div>
                    <h3 class="font-bold text-teal-800 text-base mb-1">💡 2인조 및 3인조 조합 설명</h3>
                    <ul class="text-teal-700 text-sm space-y-1 list-disc pl-4 leading-relaxed">
                      <li>전도 대원의 수에 맞춰 <strong>남는 사람 없이 모든 인원을 2인 혹은 3인</strong>으로만 묶어 드립니다.</li>
                      <li>이름은 입력창에 <strong>공백(띄어쓰기)</strong>이나 <strong>줄바꿈</strong>으로 구분해서 편하게 작성해 주세요.</li>
                      <li>인원을 입력하면 구성 가능한 조합 리스트가 표시되어 직접 선택할 수 있습니다!</li>
                    </ul>
                  </div>
                </div>
              </div>
            )}

            {/* 입력 및 제어 카드 */}
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 md:p-6">
              <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between">
                  <label class="text-base font-bold text-slate-700 flex items-center gap-2">
                    <Icon name="user-plus" className="text-teal-600" />
                    전도 대원 명단 입력
                  </label>
                  <div class="flex gap-2">
                    <button onClick={handleLoadSamples} class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-semibold border border-slate-200 cursor-pointer">
                      ✨ 샘플 이름 입력
                    </button>
                    <button onClick={handleClear} class="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1 cursor-pointer">
                      <Icon name="trash-2" className="w-3.5 h-3.5" />
                      지우기
                    </button>
                  </div>
                </div>

                <div class="relative">
                  <textarea
                    value={inputText}
                    onChange={(e) => setInputText(e.target.value)}
                    placeholder="대원들의 이름을 공백(띄어쓰기) 또는 엔터로 구분하여 넣어주세요. 예: 김사랑 박동역 이은혜 최믿음"
                    class="w-full h-32 md:h-36 p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-slate-800 placeholder-slate-400 outline-none transition-all resize-none font-medium leading-relaxed"
                  />
                  {names.length > 0 && (
                    <div class="absolute bottom-3 right-3 bg-teal-50 text-teal-700 text-xs font-bold px-2.5 py-1 rounded-md border border-teal-200">
                      현재 입력: {names.length}명
                    </div>
                  )}
                </div>

                {/* 조합 선택 영역 */}
                {names.length >= 2 && (
                  <div class="bg-slate-50 rounded-xl p-4 border border-slate-200/60">
                    <div class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-1.5">
                      <Icon name="layers" className="text-teal-600 w-4.5 h-4.5" />
                      가능한 조 조합 선택 ({names.length}명 기준)
                    </div>

                    {combinations.length > 0 ? (
                      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2.5">
                        {combinations.map((combo) => {
                          const isSelected = selectedCombo?.id === combo.id;
                          return (
                            <button
                              key={combo.id}
                              type="button"
                              onClick={() => setSelectedCombo(combo)}
                              class={`flex items-center justify-between p-3.5 rounded-xl border text-left transition-all cursor-pointer ${
                                isSelected 
                                  ? 'border-teal-500 bg-teal-50/70 ring-2 ring-teal-500/20 text-teal-900' 
                                  : 'border-slate-200 bg-white hover:border-slate-300 text-slate-700'
                              }`}
                            >
                              <div class="flex flex-col gap-0.5">
                                <span class="font-bold text-sm">2인조 {combo.groupsOf2}개 + 3인조 {combo.groupsOf3}개</span>
                                <span class="text-xs text-slate-500">총 {combo.totalGroups}개 조 편성</span>
                              </div>
                              <div class={`w-5 h-5 rounded-full border flex items-center justify-center transition-all ${isSelected ? 'border-teal-600 bg-teal-600 text-white' : 'border-slate-300 bg-slate-50'}`}>
                                {isSelected && <Icon name="check" className="w-3.5 h-3.5" />}
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    ) : (
                      <div class="text-xs text-rose-600 font-semibold p-2 bg-rose-50 rounded-lg">
                        ⚠️ 완벽히 나눌 수 없는 인원수입니다.
                      </div>
                    )}

                    <div class="flex items-center gap-4 mt-4 pt-3 border-t border-slate-200/60 text-xs text-slate-500">
                      <span class="font-bold text-slate-600">정렬 기준:</span>
                      <div class="flex gap-2">
                        <button type="button" onClick={() => setPriority('prefer2')} class={`px-3 py-1.5 rounded-md font-semibold cursor-pointer ${priority === 'prefer2' ? 'bg-teal-600 text-white' : 'bg-white border border-slate-200 text-slate-600'}`}>2인조 우선</button>
                        <button type="button" onClick={() => setPriority('prefer3')} class={`px-3 py-1.5 rounded-md font-semibold cursor-pointer ${priority === 'prefer3' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600'}`}>3인조 우선</button>
                      </div>
                    </div>
                  </div>
                )}

                {errorMessage && <div class="bg-red-50 text-red-700 text-sm p-3.5 rounded-xl border border-red-100 font-medium">⚠️ {errorMessage}</div>}

                <button
                  onClick={handleShuffle}
                  disabled={isShuffling || names.length < 2 || !selectedCombo}
                  class={`w-full py-4 rounded-xl font-bold text-lg shadow-sm transition-all transform flex items-center justify-center gap-2 cursor-pointer ${
                    isShuffling ? 'bg-slate-300 text-slate-600 cursor-not-allowed' : names.length < 2 || !selectedCombo ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-teal-500 to-emerald-600 text-white hover:shadow-md'
                  }`}
                >
                  <Icon name="shuffle" class={`w-5 h-5 ${isShuffling ? 'animate-spin' : ''}`} />
                  {isShuffling ? '동역자 매칭 중...' : '임의로 조 짜기! 🎲'}
                </button>
              </div>
            </div>

            {/* 애니메이션 로딩 상태 */}
            {isShuffling && (
              <div class="bg-white rounded-2xl border border-slate-200 shadow-md p-8 text-center flex flex-col items-center justify-center py-12 gap-4">
                <div class="relative">
                  <div class="w-16 h-16 rounded-full border-4 border-slate-100 border-t-teal-600 animate-spin"></div>
                  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-emerald-500 font-bold">🔍</div>
                </div>
                <div class="text-lg font-bold text-slate-700 mt-2">{shuffleText}</div>
              </div>
            )}

            {/* 매칭 결과 카드 */}
            {!isShuffling && groups.length > 0 && (
              <div class="bg-white rounded-2xl border border-slate-200 shadow-md p-5 md:p-6 animate-fadeIn">
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between pb-4 mb-5 border-b border-slate-100 gap-3">
                  <div>
                    <h2 class="text-xl font-extrabold text-slate-800 flex items-center gap-2">
                      <span class="w-2.5 h-6 bg-teal-500 rounded-full inline-block"></span>
                      매칭 완료 👏
                    </h2>
                    <p class="text-xs text-slate-500 mt-1">총 {names.length}명이 지정 조합대로 조로 분배되었습니다.</p>
                  </div>
                  <button onClick={handleCopyToClipboard} class="flex items-center gap-1.5 text-sm font-bold px-4 py-2.5 rounded-xl border transition-all bg-white text-slate-700 border-slate-200 hover:bg-slate-50 cursor-pointer">
                    <Icon name={copied ? "check" : "copy"} className={copied ? "text-emerald-600" : "text-slate-500"} />
                    {copied ? '복사 완료!' : '전체 결과 복사'}
                  </button>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {groups.map((group, index) => {
                    const colorSchemes = [
                      'from-teal-50 to-emerald-50/40 border-teal-100 text-teal-800',
                      'from-indigo-50 to-blue-50/40 border-indigo-100 text-indigo-800',
                      'from-amber-50 to-yellow-50/40 border-amber-100 text-amber-800',
                      'from-rose-50 to-pink-50/40 border-rose-100 text-rose-800'
                    ];
                    const scheme = colorSchemes[index % colorSchemes.length];
                    return (
                      <div key={index} class={`bg-gradient-to-br ${scheme} border rounded-2xl p-5 shadow-sm`}>
                        <div class="flex items-center justify-between mb-3.5">
                          <span class="text-base font-extrabold flex items-center gap-1.5">👥 {index + 1}조</span>
                          <span class="text-xs font-bold px-2.5 py-1 bg-white/80 rounded-full border border-black/5 text-slate-700">{group.length}명 짝</span>
                        </div>
                        <div class="flex flex-wrap gap-2">
                          {group.map((member, mIdx) => (
                            <div key={mIdx} class="px-3.5 py-2 bg-white rounded-xl shadow-sm border border-black/5 font-bold text-slate-800 flex items-center gap-1.5 text-sm">
                              <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                              {member}
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* 세션 히스토리 */}
            {history.length > 0 && (
              <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 md:p-6">
                <h3 class="text-sm font-bold text-slate-600 mb-4 flex items-center gap-1.5">
                  <Icon name="history" className="text-indigo-500" />
                  최근 매칭 내역
                </h3>
                <div class="flex flex-col gap-2">
                  {history.map((item, index) => (
                    <div key={item.id} class="flex items-center justify-between p-3 rounded-xl bg-slate-50 border border-slate-100 text-sm">
                      <div class="flex items-center gap-3">
                        <span class="text-xs font-bold text-slate-400 bg-slate-200 px-2 py-0.5 rounded-md">#{history.length - index}</span>
                        <span class="font-semibold text-slate-700">총 {item.total}명 ({item.comboDesc})</span>
                      </div>
                      <button onClick={() => setGroups(item.data)} class="text-xs bg-white text-indigo-600 hover:bg-indigo-50 border border-indigo-200 px-3 py-1.5 rounded-lg font-bold cursor-pointer">다시보기</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          <footer class="bg-slate-100 border-t border-slate-200 mt-12 py-6 text-center text-xs text-slate-500">
            <p class="font-semibold text-slate-600">전도짝만들기 - 믿음의 소중한 동역 매칭 👥</p>
            <p class="mt-1">© 2026 전도짝메이커. 모든 대원들의 소중하고 값진 믿음의 교제를 늘 응원합니다.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

```
